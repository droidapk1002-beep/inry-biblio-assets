<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.openai.com https://api.anthropic.com https://generativelanguage.googleapis.com https://api.mymemory.translated.net; frame-src https://drive.google.com; object-src 'none'; base-uri 'self';">
<script>window.addEventListener('pageshow',function(e){if(e.persisted)location.reload();});</script>
<title>Bibliothèque — INRY-Biblio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700;900&family=Source+Sans+3:wght@400;600;700&family=Amiri:wght@400;700&family=Noto+Sans+Arabic:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="css/tokens.css?v=39">
<link rel="stylesheet" href="css/components.css?v=39">
<link rel="stylesheet" href="css/assistant-admin.css?v=39">
</head>
<body>
<a href="#main" class="skip-link">Aller au contenu</a>
<div id="header-root"></div>

<main id="main">
  <section class="section" style="padding-bottom:0;">
    <div class="container">
      <div class="section-header">
        <div>
          <div class="eyebrow" data-i18n="nav.library"></div>
          <h2 data-i18n="hero.cta"></h2>
        </div>
        <form id="search-form" style="display:flex; gap:0.5rem;">
          <input type="search" id="filter-search" class="filter-select" style="min-width:240px;" data-i18n-placeholder="hero.searchPlaceholder">
        </form>
      </div>

      <div class="filters-bar">
        <select id="filter-level" class="filter-select"></select>
        <select id="filter-stream" class="filter-select"></select>
        <select id="filter-subject" class="filter-select"></select>
        <select id="filter-type" class="filter-select"></select>
        <select id="filter-trimestre" class="filter-select"></select>
        <select id="filter-year" class="filter-select"></select>
        <button class="btn btn-ghost" id="filter-reset" data-i18n="filters.reset"></button>
        <button class="btn btn-ghost" id="fav-filter-btn"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span> <span data-i18n="library.favorites">Favoris</span></button>
        <span class="filters-meta" id="filters-count"></span>
      </div>
    </div>
  </section>

  <section class="section" style="padding-top:0;">
    <div class="container">
      <div class="doc-grid" id="library-grid"></div>
    </div>
  </section>
</main>

<div id="footer-root"></div>
<div id="modal-root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="js/icons.js?v=39"></script>
<script src="js/i18n.js?v=39"></script>
<script src="js/layout.js?v=39"></script>
<script src="js/documents.js?v=39"></script>
<script src="js/admin.js?v=39"></script>
<script src="js/assistant.js?v=39"></script>
<script src="js/doc-manager.js?v=39"></script>
<script>
function applyURLParamsToFilters() {
  const params = new URLSearchParams(window.location.search);
  ['level', 'levelGroup', 'stream', 'subject', 'type', 'trimestre', 'year'].forEach(key => {
    if (params.has(key)) APP.filters[key] = params.get(key);
  });
  if (params.has('q')) APP.filters.search = params.get('q');
}

async function init() {
  await loadData();
  applyLangToDocument();
  applyLocalDocOverrides();
  applyURLParamsToFilters();
  render();
}

function renderLibrary() {
  const docs = getFilteredDocs();
  renderDocGrid('library-grid', docs);
  document.getElementById('filters-count').textContent = docs.length + ' ' + t('filters.results');
}

function render() {
  document.title = t('nav.library') + ' — ' + t('siteName');
  document.getElementById('header-root').innerHTML = renderHeader('library');
  document.getElementById('footer-root').innerHTML = renderFooter();
  document.getElementById('modal-root').innerHTML = renderDocModal();
  translateStaticDOM();
  document.getElementById('theme-toggle').innerHTML = icon(APP.theme === 'light' ? 'moon' : 'sun');

  populateFilterBar();
  wireFilterBar(renderLibrary);
  wireLayoutEvents();
  renderLibrary();

  document.getElementById('search-form').addEventListener('submit', (e) => e.preventDefault());
}

function onLangChange() { render(); }

init();
</script>
</body>
</html>
